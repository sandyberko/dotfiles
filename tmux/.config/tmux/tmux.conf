set -g default-terminal "tmux-256color"
set -g base-index 1
set -g mouse on
set -g status-right ''


set -g prefix M-space

unbind n
unbind p
bind -r h previous-window                             # select previous window
bind -r l next-window                                 # select next window
bind -r S-H swap-window -t -1 \; select-window -t -1  # swap current window with the previous one
bind -r S-L swap-window -t +1 \; select-window -t +1  # swap current window with the next one
bind Tab last-window                                    # move to last active window

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# Meaningful pane split commands
bind | split-window -h
bind _ split-window -v
# Unbinding old split keys
unbind '"'
unbind '%'

# don't rename windows automatically
set-option -g allow-rename off

# vi mode
set-window-option -g mode-keys vi

# style
setw -g status-style 'bg=black'

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '
